name: Daily Cypress Scraper

# When should this robot wake up?
on:
  schedule:
    # This is "Cron" syntax. It translates to: Run every day at 10:00 AM UTC (which is 2:00 AM/3:00 AM PST)
    - cron: '0 10 * * *' 
  # This line allows you to click a "Run" button on GitHub to test it manually!
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code onto the cloud computer
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Node.js (for Prisma and TypeScript)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install Python (for your scraper)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Install your project's dependencies
      - name: Install Node Modules
        run: npm install

      # 5. Install any Python requirements (adjust if you use pipenv or specific packages like requests/beautifulsoup)
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 

      # 6. Run your scraper (Change 'scraper.py' to whatever your python file is actually named!)
      - name: Run Python Scraper
        run: python scraper.py

      # 7. Push the new data to Supabase
      - name: Update Supabase Database
        env:
          # This pulls your secure database URL from GitHub Secrets so hackers can't see it
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 
        run: npx tsx seed.ts